{% extends "base.html" %}
{% block title %}Admin Login – Sainik Public School{% endblock %}
{% block extra_head %}
<style>
.auth-page{min-height:80vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);padding:40px 20px;position:relative;overflow:hidden;}
.auth-page::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,#c9a84c 0,#c9a84c 1px,transparent 0,transparent 50%);background-size:22px 22px;opacity:.05;}
.auth-card{background:var(--white);border-radius:18px;padding:40px;width:100%;max-width:400px;position:relative;border-top:4px solid var(--gold);box-shadow:0 20px 60px rgba(0,0,0,.3);}
.auth-logo{text-align:center;margin-bottom:28px;}
/* .auth-logo .logo-icon{margin:0 auto 12px;width:64px;height:64px;} */
.auth-logo .logo-icon{margin:0 auto 12px;width:64px;height:64px;background:#0a1f44;border-radius:50%;border:3px solid #c9a84c;display:flex;align-items:center;justify-content:center;}
.auth-logo h2{font-family:'Playfair Display',serif;color:var(--navy);font-size:1.5rem;}
.auth-logo p{color:var(--text-light);font-size:.85rem;margin-top:4px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;color:var(--text);font-size:.8rem;margin-bottom:6px;font-weight:600;}
.form-group input{width:100%;background:var(--gray);border:1.5px solid #dde2ef;border-radius:8px;padding:11px 14px;color:var(--text);font-family:'Mulish',sans-serif;font-size:.88rem;outline:none;transition:border-color .25s;}
.form-group input:focus{border-color:var(--navy);}
.auth-btn{width:100%;background:var(--navy);color:#fff;border:none;padding:13px;border-radius:50px;font-family:'Mulish',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .25s;margin-top:4px;}
.auth-btn:hover{background:var(--navy-light);}
.auth-hint{background:var(--cream);border-radius:8px;padding:12px 14px;font-size:.8rem;color:var(--text-light);margin-top:16px;border-left:3px solid var(--gold);}
</style>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <!-- <div class="logo-icon"><svg viewBox="0 0 40 40"><path d="M20 4L4 14v4h4v14h4V20h8v12h4V18h4v-4L20 4z"/><circle cx="20" cy="10" r="3"/></svg></div> -->
      <div class="logo-icon"><svg viewBox="0 0 40 40" style="fill:#c9a84c;width:36px;height:36px;"><path d="M20 4L4 14v4h4v14h4V20h8v12h4V18h4v-4L20 4z"/><circle cx="20" cy="10" r="3"/></svg></div> 
      <h2>Admin Login</h2>
      <p>Sainik Public School Management Panel</p>
    </div>
    <form method="POST">
      <div class="form-group"><label>Username</label><input name="username" type="text" placeholder="admin" required autofocus></div>
      <div class="form-group"><label>Password</label><input name="password" type="password" placeholder="Enter password" required></div>
      <!-- Cloudflare Turnstile Captcha -->
      {% if cf_site_key %}
      <div class="cf-turnstile"
          data-sitekey="{{ cf_site_key }}"
          data-theme="light"
          style="margin-bottom:16px;">
      </div>
      {% endif %}
      <button type="submit" class="auth-btn"><i class="fas fa-lock" style="margin-right:8px"></i>Login to Admin Panel</button>
    </form>
    <!-- <div class="auth-hint">
      <strong>Default credentials:</strong><br>
      Username: <strong>admin</strong> &nbsp;|&nbsp; Password: <strong>admin123</strong>
    </div> -->
    <p style="text-align:center;margin-top:16px;font-size:.82rem;color:var(--text-light);">
      <a href="/" style="color:var(--navy);font-weight:600;">← Back to School Website</a>
    </p>
  </div>
</div>
{% endblock %}
